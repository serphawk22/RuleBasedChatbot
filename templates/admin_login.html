<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | AllyBot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card {
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            width: 360px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        h2 { margin-bottom: 24px; font-weight: 700; color: var(--text); }
        input { 
            width: 100%; padding: 12px; margin-bottom: 16px; 
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); border-radius: 8px; outline: none;
        }
        button {
            width: 100%; padding: 12px; background: var(--accent);
            color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
        .error { color: var(--danger); font-size: 0.85rem; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="/static/logo.png" alt="Ally Tech Logo" style="height: 48px; width: auto; object-fit: contain; margin-bottom: 16px;">
        <h2 style="margin-top: 0;">Admin <span>Login</span></h2>
        <form method="POST">
            <input type="password" name="password" placeholder="Enter Admin Password" required autofocus>
            <button type="submit">Unlock Dashboard</button>
        </form>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </div>
</body>
</html>
